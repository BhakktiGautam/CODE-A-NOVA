<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | CareWell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <h2>CareWell</h2>
        <span>Healthcare</span>
    </div>

    <ul>
        <li><a href="index.html">Home</a></li>
    </ul>
</nav>

<section class="contact-section">

    <div class="contact-info">

        <h1>Contact Us</h1>

        <p>We are here to help you with your healthcare needs.</p>

        <div class="info-card">
            <h3>📍 Address</h3>
            <p>123 Healthcare Street, New Delhi, India</p>
        </div>

        <div class="info-card">
            <h3>📞 Phone</h3>
            <p>+91 98765 43210</p>
        </div>

        <div class="info-card">
            <h3>📧 Email</h3>
            <p>info@carewell.com</p>
        </div>

        <div class="info-card">
            <h3>🕒 Working Hours</h3>
            <p>Mon - Sat : 9:00 AM - 8:00 PM</p>
        </div>

    </div>

    <div class="contact-form-container">

        <form id="contact-form">

           <input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="subject" placeholder="Subject" required>

<textarea id="message" rows="6" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
