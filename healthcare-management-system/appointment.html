<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | CareWell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <h2>CareWell</h2>
        <span>Healthcare</span>
    </div>

    <ul>
        <li><a href="index.html">Home</a></li>
    </ul>
</nav>

<section class="appointment-section">

    <h1>Book an Appointment</h1>
    <p>Fill out the form below and our team will contact you shortly.</p>

    <form id="appointment-form">

        <input type="text" id="patient-name" placeholder="Patient Name" required>

        <input type="email" id="email" placeholder="Email Address" required>

        <input type="tel" id="phone" placeholder="Phone Number" required>

        <input type="number" id="age" placeholder="Age" required>

        <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <select id="doctor" required>
            <option value="">Select Doctor</option>
            <option>Dr. Arjun Sharma</option>
            <option>Dr. Neha Gupta</option>
            <option>Dr. Rahul Verma</option>
            <option>Dr. Priya Patel</option>
        </select>

        <input type="date" id="date" required>

        <input type="time" id="time" required>

        <textarea id="symptoms" rows="5" placeholder="Describe Symptoms"></textarea>

        <button type="submit">Book Appointment</button>

    </form>

</section>

<script src="script.js"></script>

</body>
</html>
